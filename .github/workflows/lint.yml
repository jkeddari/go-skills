name: Lint

on:
  push:
    branches: [main]
    paths: ['skills/**', 'AGENTS.md', 'README.md', '.markdownlint-cli2.jsonc', '.github/workflows/lint.yml']
  pull_request:
    paths: ['skills/**', 'AGENTS.md', 'README.md', '.markdownlint-cli2.jsonc', '.github/workflows/lint.yml']
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Markdown linting
      - name: markdownlint-cli2-action
        uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          config: '.markdownlint-cli2.jsonc'
          globs: '**/*.md'
